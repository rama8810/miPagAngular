name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"] # Se ejecuta cada vez que subes código a la rama main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Angular Project
        # Compila el proyecto para producción
        run: npm run build -- --configuration production
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ATENCIÓN: Esta ruta depende de tu angular.json. 
          # Por defecto en las versiones recientes con esbuild suele ser dist/nombre-del-proyecto/browser
          path: './dist/miPagAngular/browser' 
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4