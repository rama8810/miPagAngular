name: Update Tech News Data

on:
  schedule:
    # Se ejecuta a las 3:37 AM (Colombia)
    - cron: '37 8 * * *'
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso estricto para poder hacer commit en el repositorio

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ejecutar Curador de Noticias IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/curar-noticias.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/assets/data/news.json
          # Si no hay noticias nuevas, evita que el workflow falle
          git commit -m "🤖 Auto-update: Curación diaria de noticias JSON" || echo "No hay cambios para hacer commit"
          git push