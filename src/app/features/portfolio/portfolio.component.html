<section id="portfolio" class="section-spaced">
  <div class="container">

    <div class="heading">
      <h2 class="title ">Portafolio</h2>
      <p>demostraciones practicas de desarrollo web, arquitectura frontend, integración de APIs y uso de IA</p>
    </div>
    
    <div class="portfolio-grid project-showcase">
      <div class="project-card mockup-shadow" *ngFor="let project of projects">
        
        <div class="project-image-container">
          <img [src]="project.image" [alt]="project.title" loading="lazy">
        </div>
        
        <div class="project-info">
          <h3 class="client-name">{{ project.title }}</h3>
          <p class="project-description">{{ project.description }}</p>
          
          <div class="tech-stack">
            <span class="tech-item" *ngFor="let tag of project.tags">{{ tag }}</span>
          </div>
          
          <ng-container *ngIf="project.isInternal; else external">
            <a [routerLink]="project.link" class="btn-visit">
              {{ project.buttonText || 'Visitar sitio web' }}
            </a>
          </ng-container>
          
          <ng-template #external>
            <a [href]="project.link" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="btn-visit">
              {{ project.buttonText || 'Visitar sitio web' }}
            </a>
          </ng-template>
        </div>

      </div>
    </div>
  </div>
</section>
